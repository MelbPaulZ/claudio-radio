name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build claudio image (load to local daemon)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: claudio-radio:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ncm image (load to local daemon)
        uses: docker/build-push-action@v5
        with:
          context: docker/ncm
          file: docker/ncm/Dockerfile
          tags: claudio-ncm:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write dummy .env
        run: |
          cat > .env <<'EOF'
          NETEASE_USER_ID=0
          NETEASE_COOKIE=MUSIC_U=ci-dummy
          VOLC_APPID=ci-app
          VOLC_ACCESS_TOKEN=ci-tok
          OPENWEATHER_API_KEY=ci-wk
          CLAUDE_MODE=api
          ANTHROPIC_API_KEY=sk-ci-dummy
          PORT=8787
          LOG_LEVEL=info
          EOF
          mkdir -p data cache user
          # Container runs as uid 1000 (node user); make bind-mount dirs writable.
          sudo chown -R 1000:1000 data cache user

      - name: Override compose to use local images
        run: |
          sed -i 's|melbpaulz/claudio-radio:.*|claudio-radio:ci|' compose.yml
          sed -i 's|melbpaulz/claudio-ncm:.*|claudio-ncm:ci|' compose.yml

      - name: Compose up
        run: docker compose up -d

      - name: Wait for claudio healthy (max 60s)
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' claudio-radio 2>/dev/null || echo missing)
            echo "[$i] claudio health: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "Container never became healthy. Logs:"
          docker compose logs
          exit 1

      - name: Hit /health
        run: curl -sf http://localhost:8787/health

      - name: Hit /
        run: curl -sf http://localhost:8787/ > /dev/null

      - name: Check no FATAL in logs
        run: |
          if docker compose logs | grep -i 'FATAL\|UnhandledRejection\|EADDRINUSE'; then
            echo "Found fatal log line"
            exit 1
          fi

      - name: Compose down
        if: always()
        run: docker compose down -v
