name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push claudio-radio (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            melbpaulz/claudio-radio:${{ steps.meta.outputs.version }}
            melbpaulz/claudio-radio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push claudio-ncm (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: docker/ncm
          file: docker/ncm/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            melbpaulz/claudio-ncm:${{ steps.meta.outputs.version }}
            melbpaulz/claudio-ncm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker images

            ```bash
            docker pull melbpaulz/claudio-radio:${{ steps.meta.outputs.version }}
            docker pull melbpaulz/claudio-ncm:${{ steps.meta.outputs.version }}
            ```

            Both images: `linux/amd64` + `linux/arm64`.

            See `compose.yml` and `README.md` for setup.
