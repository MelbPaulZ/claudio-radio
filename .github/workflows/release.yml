name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags (mirror to docker.io + Aliyun ACR; only stable updates :latest)
        id: tags
        run: |
          V="${{ steps.meta.outputs.version }}"
          # 两个 registry 同步发布：docker.io 给全球用户；阿里云 ACR 给国内服务器拉
          REGISTRIES=(
            "melbpaulz"
            "crpi-uekw186l23k0tbza.cn-beijing.personal.cr.aliyuncs.com/melbpaulz"
          )
          is_stable=false
          if [[ "$V" != *-* ]]; then
            is_stable=true
          fi

          radio_tags=""
          ncm_tags=""
          for reg in "${REGISTRIES[@]}"; do
            radio_tags+="${reg}/claudio-radio:${V}"$'\n'
            ncm_tags+="${reg}/claudio-ncm:${V}"$'\n'
            if [ "$is_stable" = "true" ]; then
              radio_tags+="${reg}/claudio-radio:latest"$'\n'
              ncm_tags+="${reg}/claudio-ncm:latest"$'\n'
            fi
          done

          {
            echo "radio<<EOF"
            printf "%s" "$radio_tags"
            echo "EOF"
            echo "ncm<<EOF"
            printf "%s" "$ncm_tags"
            echo "EOF"
            if [ "$is_stable" = "true" ]; then
              echo "is_prerelease=false"
            else
              echo "is_prerelease=true"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun ACR (个人版，国内中转用)
        uses: docker/login-action@v3
        with:
          registry: crpi-uekw186l23k0tbza.cn-beijing.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build & push claudio-radio (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.radio }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push claudio-ncm (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: docker/ncm
          file: docker/ncm/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.ncm }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.tags.outputs.is_prerelease == 'true' }}
          body: |
            ## Docker images

            **From Docker Hub** (overseas / general):
            ```bash
            docker pull melbpaulz/claudio-radio:${{ steps.meta.outputs.version }}
            docker pull melbpaulz/claudio-ncm:${{ steps.meta.outputs.version }}
            ```

            **From Aliyun ACR** (mainland China deployments):
            ```bash
            docker pull crpi-uekw186l23k0tbza.cn-beijing.personal.cr.aliyuncs.com/melbpaulz/claudio-radio:${{ steps.meta.outputs.version }}
            docker pull crpi-uekw186l23k0tbza.cn-beijing.personal.cr.aliyuncs.com/melbpaulz/claudio-ncm:${{ steps.meta.outputs.version }}
            ```

            Both images: `linux/amd64` + `linux/arm64`.

            See `compose.yml` and `README.md` for setup.
