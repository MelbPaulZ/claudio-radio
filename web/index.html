<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>CLAUDIO</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" />
  <style>
    /* =========== TOKENS =========== */
    :root {
      --bg: #000000;
      --bg-1: #0a0a0a;
      --bg-2: #141414;
      --ink: #f2f2f2;
      --ink-2: #8a8a8a;
      --ink-3: #4a4a4a;
      --rule: #1f1f1f;
      --rule-2: #2a2a2a;
      --accent: #d42a2a;     /* Nothing 红 */
      --accent-dim: #5a1414;

      --f-display: "Doto", "Space Mono", ui-monospace, monospace;
      --f-sans: "Space Grotesk", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      --f-mono: "Space Mono", ui-monospace, "SF Mono", Menlo, monospace;

      --tk-xs: 10px;
      --tk-sm: 11px;
      --tk-md: 13px;
      --tk-lg: 16px;
      --tk-xl: 22px;

      --pad-x: 24px;
    }

    /* =========== RESET =========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--f-sans);
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* =========== HEADER =========== */
    .brand-bar {
      padding: 12px var(--pad-x) 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--rule);
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-2);
    }
    .brand-bar .brand { color: var(--ink); letter-spacing: 0.28em; font-weight: 700; }
    .brand-bar .brand .dot { color: var(--accent); }
    .brand-bar .mid {
      font-family: var(--f-display);
      font-weight: 700;
      font-size: 28px;
      color: var(--ink);
      letter-spacing: 0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .brand-bar .right { text-align: right; }
    .status { display: inline-flex; align-items: center; gap: 6px; }
    .status::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink-3);
      box-shadow: 0 0 0 0 var(--ink-3);
    }
    .status.on::before { background: var(--accent); animation: pulse 2s ease-in-out infinite; }
    .status.off::before { background: var(--ink-3); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,42,42,0.6); }
      50% { box-shadow: 0 0 0 4px rgba(212,42,42,0); }
    }

    /* =========== BODY GRID =========== */
    body {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    /* =========== NOW-PLAYING BAND =========== */
    .mini-header {
      display: grid;
      grid-template-columns: clamp(96px, 28vw, 140px) 1fr auto;
      grid-template-rows: auto auto;
      gap: 4px 20px;
      padding: 20px var(--pad-x) 18px;
      position: relative;
      background: linear-gradient(180deg, #0c0c0c 0%, #070707 55%, #030303 100%);
      border-bottom: 1px solid var(--rule);
    }
    /* subtle LED-style underline → reinforces "hardware panel" feel */
    .mini-header::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(to right,
        transparent 0%,
        var(--accent-dim) 18%,
        var(--accent-dim) 82%,
        transparent 100%);
      opacity: 0.55;
      pointer-events: none;
    }
    .mini-header .thumb {
      grid-column: 1;
      grid-row: 1;
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--bg-1);
      background-size: cover;
      background-position: center;
      border: 1px solid var(--rule-2);
      border-radius: 50%;
      align-self: start;
    }
    .mini-header .thumb .corner { display: none; }
    .mini-header .thumb.spinning { animation: mh-spin 40s linear infinite; }
    .mini-header .thumb.spinning .corner { animation: none; }
    @keyframes mh-spin { to { transform: rotate(360deg); } }

    .mini-header .mh-body {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: flex-start;
      padding-top: 2px;
    }
    .mini-header .mh-caption {
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      color: var(--ink-2);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      line-height: 1;
    }
    .mini-header .mh-caption .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      vertical-align: 1px;
      animation: pulse 2s ease-in-out infinite;
    }
    .mini-header .mh-title {
      font-family: var(--f-sans);
      font-weight: 300;
      font-size: clamp(20px, 5.6vw, 28px);
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }
    .mini-header .mh-artist {
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      color: var(--ink-2);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .mini-header .mh-controls {
      grid-column: 3;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
      align-self: start;
      padding-top: 2px;
    }
    .mini-header .mh-skip {
      display: flex;
      gap: 6px;
    }
    .mini-header .mh-skip .btn-sm { width: 40px; height: 40px; flex: 1; }
    .mini-header .mh-controls .btn-play { width: 100%; }
    .btn-sm {
      background: transparent;
      border: 1px solid var(--rule-2);
      color: var(--ink);
      width: 40px; height: 40px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--f-mono);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .btn-sm:hover { background: var(--bg-1); border-color: var(--ink-3); }
    .btn-sm:active { background: var(--bg-2); }
    .btn-sm:focus-visible { outline: 1px solid var(--ink-2); outline-offset: 2px; }
    .btn-sm.btn-play {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--bg);
      height: 48px;
    }
    .btn-sm.btn-play:hover { background: var(--ink-2); border-color: var(--ink-2); color: var(--bg); }
    .btn-sm .g { font-family: var(--f-display); font-size: 14px; line-height: 1; }
    .btn-sm.btn-play .g { font-size: 16px; }

    .mini-header .mh-scrub {
      grid-column: 1 / span 3;
      grid-row: 2;
      margin-top: 16px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 12px;
    }
    .mini-header .mh-scrub .t {
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      letter-spacing: 0.06em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .mini-header .mh-scrub .t.cur { color: var(--ink); text-align: left; }
    .mini-header .mh-scrub .t.tot { color: var(--ink-3); text-align: right; }
    .mini-header .segbar {
      display: grid;
      grid-template-columns: repeat(56, 1fr);
      gap: 2px;
      height: 8px;
    }
    .mini-header .segbar span { background: var(--rule-2); }
    .mini-header .segbar span.on { background: var(--ink); }
    .mini-header .segbar span.hot { background: var(--ink); box-shadow: 0 0 6px rgba(242,242,242,0.5); }

    /* =========== CHAT LOG =========== */
    .chat-log {
      overflow-y: auto;
      overflow-x: hidden;
      padding: 44px var(--pad-x) 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--rule-2) transparent;
      /* signal fade: dissolves old messages into black as they scroll up,
         and creates an air gap below the player panel */
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0,
        rgba(0,0,0,0.35) 24px,
        rgba(0,0,0,0.8) 72px,
        #000 120px,
        #000 100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0,
        rgba(0,0,0,0.35) 24px,
        rgba(0,0,0,0.8) 72px,
        #000 120px,
        #000 100%
      );
    }
    .chat-log::-webkit-scrollbar { width: 4px; }
    .chat-log::-webkit-scrollbar-thumb { background: var(--rule-2); }
    .chat-log::-webkit-scrollbar-track { background: transparent; }
    @media (prefers-reduced-motion: reduce) {
      .chat-log { scroll-behavior: auto; }
    }

    .chat-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-row + .chat-row { margin-top: 28px; }
    .chat-row.dj { align-items: flex-start; }
    .chat-row.user { align-items: flex-end; }
    .chat-row.event + .chat-row.dj { margin-top: 10px; }

    /* =========== EVENT ROW (track change) =========== */
    .chat-event {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px 10px 14px;
      border-left: 2px solid var(--ink-3);
      background: transparent;
      max-width: 82%;
      position: relative;
    }
    .chat-event .ev-cover {
      flex: 0 0 auto;
      width: 42px; height: 42px;
      background-color: var(--bg-1);
      background-size: cover;
      background-position: center;
      border: 1px solid var(--rule-2);
    }
    .chat-event .ev-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .chat-event .ev-label {
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      letter-spacing: 0.22em;
      color: var(--ink-2);
      text-transform: uppercase;
      line-height: 1;
    }
    .chat-event .ev-title {
      font-family: var(--f-sans);
      font-weight: 500;
      font-size: var(--tk-md);
      color: var(--ink);
      letter-spacing: 0;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }
    .chat-event .ev-sub {
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      color: var(--ink-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* =========== HOUR SEPARATOR =========== */
    .chat-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      letter-spacing: 0.22em;
      color: var(--ink-3);
      text-transform: uppercase;
      line-height: 1;
    }
    .chat-sep::before, .chat-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .chat-sep:first-child { margin-top: 0; }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      font-family: var(--f-sans);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.65;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      position: relative;
      border-radius: 2px;
    }

    .bubble.dj {
      background: var(--bg-1);
      border: 1px solid var(--rule);
      border-left: 2px solid var(--accent);
      color: var(--ink);
    }

    .bubble.user {
      max-width: 72%;
      background: transparent;
      border: 0;
      border-right: 2px solid var(--rule-2);
      color: var(--ink-2);
      padding: 4px 14px 4px 0;
      font-family: var(--f-mono);
      font-size: var(--tk-md);
      letter-spacing: 0.02em;
      text-transform: none;
      line-height: 1.55;
      border-radius: 0;
    }

    /* TTS active: 3-bar equalizer pinned to bubble corner */
    .bubble.dj.tts {
      padding-right: 36px;
    }
    .bubble.dj.tts::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 12px;
      width: 14px;
      height: 14px;
      background-image:
        linear-gradient(var(--accent), var(--accent)),
        linear-gradient(var(--accent), var(--accent)),
        linear-gradient(var(--accent), var(--accent));
      background-repeat: no-repeat;
      background-size: 2px 40%, 2px 80%, 2px 55%;
      background-position: 0 50%, 6px 50%, 12px 50%;
      animation: eq-bars 0.9s ease-in-out infinite;
    }
    @keyframes eq-bars {
      0%, 100% { background-size: 2px 40%, 2px 80%, 2px 55%; }
      50%      { background-size: 2px 80%, 2px 30%, 2px 90%; }
    }

    .bubble.dj.thinking {
      color: var(--ink-2);
      border-left-color: var(--rule-2);
    }
    .bubble.dj.thinking::after {
      content: '_';
      color: var(--accent);
      margin-left: 2px;
      animation: bubble-blink 0.9s steps(1) infinite;
      position: static;
      background: none;
    }
    @keyframes bubble-blink { 50% { opacity: 0; } }

    .bubble.dj.error {
      border-color: var(--accent-dim);
      border-left-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }
    .bubble.dj.error::before {
      content: '[ERROR] ';
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      letter-spacing: 0.14em;
      color: var(--accent);
    }

    .timestamp {
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      color: var(--ink-3);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .chat-row.user .timestamp { text-align: right; }

    /* =========== "N NEW" PILL =========== */
    .new-pill {
      position: fixed;
      right: 20px;
      bottom: calc(64px + env(safe-area-inset-bottom) + 8px);
      z-index: 10;
      background: var(--bg);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--f-mono);
      font-size: var(--tk-xs);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }
    .new-pill:not([hidden]) {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .new-pill:hover { background: var(--accent); color: var(--ink); }

    /* =========== CHAT INPUT =========== */
    .chat {
      padding: 12px var(--pad-x) calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--rule);
      position: relative;
    }
    .chat-prompt {
      position: absolute;
      left: calc(var(--pad-x) + 12px);
      top: 50%;
      transform: translateY(calc(-50% - 1px));
      font-family: var(--f-mono);
      color: var(--accent);
      font-size: var(--tk-md);
      pointer-events: none;
      line-height: 1;
    }
    .chat-send-hint {
      position: absolute;
      right: calc(var(--pad-x) + 12px);
      top: 50%;
      transform: translateY(calc(-50% - 1px));
      font-family: var(--f-mono);
      color: var(--ink-3);
      font-size: var(--tk-xs);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      line-height: 1;
    }
    .chat-input {
      width: 100%;
      background: var(--bg-1);
      border: 1px solid var(--rule-2);
      padding: 12px 64px 12px 30px;
      color: var(--ink);
      font-size: var(--tk-md);
      font-family: var(--f-mono);
      letter-spacing: 0.04em;
      outline: none;
      border-radius: 0;
      transition: border-color 0.15s ease;
    }
    .chat-input::placeholder {
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: var(--tk-xs);
    }
    .chat-input:focus { border-color: var(--ink-2); }
    .chat:has(.chat-input:focus) .chat-send-hint { color: var(--ink-2); }
  </style>
</head>
<body>
  <header class="brand-bar">
    <div class="brand">CLAUDIO<span class="dot">.</span>RADIO</div>
    <div class="mid" id="clock">00:00</div>
    <div class="right"><span id="status" class="status off">OFFLINE</span></div>
  </header>

  <section class="mini-header" id="mini-header">
    <div class="thumb" id="cover">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
    </div>

    <div class="mh-body">
      <div class="mh-caption"><span class="dot"></span>NOW PLAYING</div>
      <div class="mh-title" id="title">—</div>
      <div class="mh-artist" id="artist">STAND BY — WAITING FOR SIGNAL</div>
    </div>

    <div class="mh-controls">
      <button class="btn-sm btn-play" id="btn-play" title="播放/暂停"><span class="g">▶</span></button>
      <div class="mh-skip">
        <button class="btn-sm" id="btn-prev" title="上一首"><span class="g">◁◁</span></button>
        <button class="btn-sm" id="btn-next" title="下一首"><span class="g">▷▷</span></button>
      </div>
    </div>

    <div class="mh-scrub">
      <span class="t cur" id="time-cur">0:00</span>
      <div class="segbar" id="segbar"></div>
      <span class="t tot" id="time-tot">0:00</span>
    </div>
  </section>

  <section class="chat-log" id="chat-log" aria-live="polite"></section>

  <button class="new-pill" id="new-pill" hidden>↓ <span id="new-pill-count">0</span> NEW</button>

  <form class="chat" id="chat-form">
    <span class="chat-prompt">&gt;</span>
    <input class="chat-input" id="chat-text" placeholder="TYPE TO TALK TO DJ" autocomplete="off" />
    <span class="chat-send-hint">↵ SEND</span>
  </form>

  <audio id="player-music" preload="auto" style="display:none"></audio>
  <audio id="player-tts" preload="auto" style="display:none"></audio>

  <script src="/app.js"></script>
</body>
</html>
